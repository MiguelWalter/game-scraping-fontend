<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesRadar Game Scraper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 GamesRadar Game Scraper</h1>
        <p>Enter any GamesRadar URL to scrape at least 10 games</p>
    </header>

    <div class="container">
        <div class="url-section">
            <input type="url" id="urlInput" placeholder="https://www.gamesradar.com/" value="https://www.gamesradar.com/">
            <button id="scrapeBtn">🎲 Scrape Games</button>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search by title, developer, publisher...">
            <button id="searchBtn">🔍 Filter</button>
            <button id="clearBtn" class="secondary">🔄 Clear</button>
        </div>

        <div id="loading" class="loading" style="display: none;">Scraping in progress...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="gamesContainer" class="games-grid"></div>
        <div id="noResults" class="no-results" style="display: none;">No games found</div>
    </div>

    <footer>
        <p>© 2024 GamesRadar Scraper – Data from real articles</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
