<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesRadar Random Game Scraper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 GamesRadar Random Game Scraper</h1>
        <p>Get 10 random game articles directly from GamesRadar</p>
    </header>

    <div class="container">
        <div class="controls">
            <button onclick="scrapeRandomGames()" class="scrape-btn">
                🎲 Get 10 Random Games from GamesRadar
            </button>
        </div>

        <div class="stats-bar">
            <span id="gameCount">Click the button to start</span>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Scraping random games from GamesRadar...</p>
        </div>

        <div id="gamesContainer" class="games-grid"></div>
    </div>

    <footer>
        <p>© 2024 GamesRadar Random Game Scraper</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
